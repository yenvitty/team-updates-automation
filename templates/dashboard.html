<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg:        #0d0f14;
    --bg2:       #13161d;
    --bg3:       #1a1e28;
    --surface:   #1f2330;
    --surface2:  #252a3a;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e8eaf2;
    --text2:     #8b90a8;
    --text3:     #555c75;
    --accent:    #f59e0b;
    --accent2:   #fbbf24;
    --blue:      #3b82f6;
    --blue2:     #60a5fa;
    --purple:    #8b5cf6;
    --cyan:      #06b6d4;
    --green:     #10b981;
    --red:       #ef4444;
    --orange:    #f97316;
    --radius:    14px;
    --radius-sm: 8px;
    --shadow:    0 4px 24px rgba(0,0,0,0.4);
    --trans:     0.2s ease;
  }
  [data-theme="light"] {
    --bg:        #f0f2f7;
    --bg2:       #e8ebf3;
    --bg3:       #dde1ec;
    --surface:   #ffffff;
    --surface2:  #f5f7fc;
    --border:    rgba(0,0,0,0.07);
    --border2:   rgba(0,0,0,0.13);
    --text:      #1a1e2e;
    --text2:     #4a5068;
    --text3:     #8b90a8;
    --shadow:    0 4px 24px rgba(0,0,0,0.09);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
  html { scroll-behavior:smooth }
  body {
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:32px 20px 60px;
    transition:background var(--trans),color var(--trans);
    font-size:14px;
    line-height:1.6;
  }
  .shell { max-width:1100px; margin:0 auto }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; padding-bottom:20px;
    border-bottom:1px solid var(--border);
    flex-wrap:wrap; gap:12px;
  }
  .header-left h1 {
    font-size:22px; font-weight:700; letter-spacing:-0.5px;
    background:linear-gradient(135deg,var(--accent2) 0%,var(--orange) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .date-row {
    display:flex; align-items:center; gap:8px;
    margin-top:4px; font-size:12px; color:var(--text2);
  }
  .live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--green);
    box-shadow:0 0 0 2px rgba(16,185,129,0.3);
    animation:ping 2s ease-in-out infinite;
  }
  @keyframes ping {
    0%,100% { box-shadow:0 0 0 2px rgba(16,185,129,0.3) }
    50%     { box-shadow:0 0 0 5px rgba(16,185,129,0.1) }
  }
  .header-right { display:flex; align-items:center; gap:10px }

  .icon-btn {
    width:36px; height:36px; border-radius:10px;
    border:1px solid var(--border2);
    background:var(--surface); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:var(--text2);
    transition:all var(--trans);
  }
  .icon-btn:hover { background:var(--surface2); color:var(--text) }
  .icon-btn:active { transform:scale(0.005) }

  /* ── REFINED SUMMARY TILES ── */
  .summary-bar {
    display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
    margin-bottom:28px;
  }
  @media(max-width:650px) { .summary-bar { grid-template-columns:1fr; } }
  .stat-tile {
  background:linear-gradient(145deg, var(--surface) 0%, var(--bg2) 100%); 
  border:1px solid var(--border);
  border-radius:var(--radius); padding:20px 24px;
  box-shadow:var(--shadow);
  position:relative; overflow:hidden;
  opacity:0; transform:translateY(28px) scale(.96);
  
  /* UPDATED: Added smooth hover reset transitions alongside the page-load animation */
  transition: opacity .85s cubic-bezier(.22,1,.36,1), 
              transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              border-color 0.25s ease,
              box-shadow 0.25s ease;
}

/* 2. ADD THIS NEW BLOCK right below it for the hover effect */
.stat-tile:hover {
  border-color: var(--border2);
  transform: translateY(-3px) scale(1); /* Gives it a subtle 3px lift */
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  
  /* Instantly kills the JS entrance delay on hover */
  transition-delay: 0s !important; 
  transition-duration: 0.2s;
}
  .stat-tile.is-visible { opacity:1; transform:translateY(0) scale(1); }
  /* Base styling for the top line on ALL tiles */
.stat-tile::before {
  content:''; position:absolute; top:0; left:0; width:100%; height:3px;
}

/* 1. Yellow/Orange line for the Members block */
.summary-bar > div:nth-child(1)::before {
  background: linear-gradient(90deg, var(--accent) 0%, var(--orange) 100%);
}

/* 2. Blue line for the Total Tasks block */
.summary-bar > div:nth-child(2)::before {
  background: linear-gradient(90deg, var(--blue2) 0%, var(--blue) 100%);
}

/* 3. Cyan/Blue line for the Pending Uploads block */
.summary-bar > div:nth-child(3)::before {
  background: linear-gradient(90deg, var(--cyan) 0%, var(--blue) 100%);
}
  .stat-tile.accent-tile::before {
    background:linear-gradient(90deg, var(--cyan) 0%, var(--blue) 100%);
    opacity:1;
  }
  .stat-tile p:first-child {
    font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--text2); margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }
  .stat-tile .stat-val {
    font-size:34px; font-weight:800; line-height:1; letter-spacing:-0.5px;
  }
  .stat-tile .stat-sub {
    font-size:12px; color:var(--text3); margin-top:6px;
  }
  /* ── FILTER BAR ── */
  .filter-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:20px;
  }
  .chips-container {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .filter-chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 14px; border-radius:50px;
    font-size:11px; font-weight:600; font-family:'Inter',sans-serif;
    cursor:pointer; border:1px solid var(--border2);
    background:var(--surface); color:var(--text2);
    transition:all var(--trans);
  }
  .filter-chip:hover { border-color:var(--border2); color:var(--text) }
  .filter-chip.active { background:rgba(245,158,11,0.14); color:var(--accent2); border-color:rgba(245,158,11,0.3) }
  .filter-dot { width:6px; height:6px; border-radius:50%; background:currentColor }
  
  .controls-wrap {
    margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .search-wrap { position:relative; }
  .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:12px; pointer-events:none }
  
  .search-input {
    background:var(--surface); border:1px solid var(--border2);
    color:var(--text); font-family:'Inter',sans-serif; font-size:12px;
    padding:7px 12px 7px 30px; border-radius:var(--radius-sm);
    transition:all var(--trans); width:180px;
  }
  .search-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(245,158,11,0.12) }
  .search-input::placeholder { color:var(--text3) }
  
  select.search-input {
    padding-left:12px; width:150px; cursor:pointer;
  }
  select.search-input option {
    background:var(--surface); color:var(--text);
  }

  /* ── MEMBER CARDS GRID ── */
  .cards-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:16px;
  }

  /* ── MEMBER CARD ── */
  .member-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:0;
    box-shadow:var(--shadow);
    transition:border-color var(--trans), transform var(--trans), box-shadow var(--trans), opacity .65s cubic-bezier(.22,1,.36,1), transform .65s cubic-bezier(.22,1,.36,1);
    overflow:visible; 
    opacity:0; transform:translateY(26px);
  }
  .member-card.is-visible { opacity:1; transform:translateY(0); }
 /* 1. Clean up the base card transition */
.member-card {
  background: var(--surface); 
  border: 1px solid var(--border);
  border-radius: var(--radius); 
  padding: 0;
  box-shadow: var(--shadow);
  /* Combined the entrance (opacity) with snappy hover transitions */
  transition: border-color var(--trans), 
              box-shadow var(--trans), 
              transform var(--trans), 
              opacity .65s cubic-bezier(.22,1,.36,1);
  overflow: visible; 
  opacity: 0; 
  transform: translateY(26px);
}

/* 2. Update the hover state */
/* 1. The base card (handles how it glides back DOWN when your mouse leaves) */
.member-card {
  background: var(--surface); 
  border: 1px solid var(--border);
  border-radius: var(--radius); 
  padding: 0;
  box-shadow: var(--shadow);
  overflow: visible; 
  opacity: 0; 
  transform: translateY(26px);
  
  /* Smooth transition for resetting back to normal */
  transition: border-color 0.25s ease, 
              box-shadow 0.25s ease, 
              transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
              opacity 0.65s cubic-bezier(.22,1,.36,1);
}

/* 2. The hover state (handles how it glides UP) */
.member-card:hover {
  border-color: var(--border2);
  transform: translateY(-5px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  
  /* A tiny 40ms intentional delay so it doesn't feel jumpy */
  transition-delay: 0.04s !important; 
  
  /* A slightly longer, premium ease-out curve for a "weightless" lift */
  transition-duration: 0.25s;
  transition-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); 
}

/* 3. Kept exactly the same */
.card-accent { height:3px; width:100% }
.card-body { padding:18px }

  .card-accent { height:3px; width:100% }
  .card-body { padding:18px }

  /* ── MEMBER HEADER ── */
  .member-hdr {
    display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .member-avatar {
    width:40px; height:40px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:700; color:#fff;
  }
  .member-name { font-size:15px; font-weight:700; letter-spacing:-0.2px }
  .member-date { font-size:11px; color:var(--text3); margin-top:1px }
  .member-hdr-right { margin-left:auto; display:flex; gap:6px; align-items:center }

  /* ── SECTION ── */
  .section { margin-bottom:14px; position:relative }
  .section:last-child { margin-bottom:0 }
  .section-label {
    display:flex; align-items:center; gap:6px;
    font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:.7px; color:var(--text3); margin-bottom:8px;
  }
  .section-label i { font-size:11px }

  /* ── TASK ITEMS ── */
  .task-list { display:flex; flex-direction:column; gap:5px }
  .task-item {
    display:flex; align-items:flex-start; gap:8px;
    font-size:12px; color:var(--text2); line-height:1.5;
  }
  .task-item i { color:var(--green); margin-top:3px; font-size:10px; flex-shrink:0 }

  /* ── UPLOAD ROWS WITH EXPANSION ENGINE ── */
  .upload-list { display:flex; flex-direction:column; gap:6px }
  .upload-row {
    display:flex; align-items:center; gap:8px;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:7px 10px;
    font-size:12px;
    position:relative;
    transition:transform var(--trans), box-shadow var(--trans), background var(--trans), border-color var(--trans);
  }
  .upload-name { 
    flex:1; font-weight:500; color:var(--text); 
    min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    transition:all var(--trans);
  }

  /* ── DYNAMIC PENDING HOVER VIEWER ── */
  .upload-row:hover {
    border-color:var(--blue2);
    background:var(--surface2);
    transform:translateY(-1px) scale(1.015);
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    z-index:20;
  }
  .upload-row:hover .upload-name {
    text-overflow:clip;
    white-space:normal;
    overflow:visible;
    word-break:break-all;
  }

  /* ── STATUS PILLS ── */
  .pill {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:50px;
    font-size:10px; font-weight:700; letter-spacing:.2px;
    white-space:nowrap; flex-shrink:0;
  }
  .pill-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.8 }

  /* ── NOTES BLOCK ── */
  .notes-block {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:9px 11px;
    font-size:12px; color:var(--text2); line-height:1.6;
    font-style:italic;
  }

  .divider { height:1px; background:var(--border); margin:12px 0 }

  /* ── STATES ── */
  .state-box {
    text-align:center; padding:60px 20px;
    color:var(--text3); font-size:13px;
  }
  .state-box i { font-size:36px; display:block; margin-bottom:14px; opacity:.4 }
  .state-box p { margin-bottom:6px }
  .state-box .state-sub { font-size:12px; color:var(--text3); opacity:.7 }
  .spin { animation:spin .8s linear infinite }
  @keyframes spin { to { transform:rotate(360deg) } }

  .fadeUp { animation: fadeUp .4s ease both }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px) }
    to   { opacity:1; transform:translateY(0) }
  }

  .empty-inline {
    font-size:11px; color:var(--text3); font-style:italic; padding:4px 0;
  }

  .no-results {
    grid-column:1/-1; text-align:center; padding:48px;
    color:var(--text3); font-size:13px;
  }
  .no-results i { font-size:30px; display:block; margin-bottom:10px; opacity:.4 }

  @media (prefers-reduced-motion: reduce) {
    .stat-tile, .member-card { transition-duration:.01ms !important; }
    .live-dot, .spin { animation:none !important; }
  }
</style>
</head>
<body>
<div class="shell">

  <header class="header fadeUp">
    <div class="header-left">
      <h1>Team Daily Dashboard</h1>
      <div class="date-row">
        <span class="live-dot"></span>
        <span id="currentDate">Loading…</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <i class="fa-solid fa-sun" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="summary-bar" id="summaryBar" style="display:none">
    <div class="stat-tile">
      <p><i class="fa-solid fa-users" style="color:var(--accent2)"></i> Members reported</p>
      <div class="stat-val" id="statMembers" style="color:var(--accent2)">0</div>
      <div class="stat-sub">active contributors</div>
    </div>
    <div class="stat-tile">
      <p><i class="fa-solid fa-list-check" style="color:var(--blue2)"></i> Total tasks</p>
      <div class="stat-val" id="statTasks" style="color:var(--blue2)">0</div>
      <div class="stat-sub">logged across team</div>
    </div>
    <div class="stat-tile accent-tile">
      <p><i class="fa-solid fa-cloud-arrow-up" style="color:var(--cyan)"></i> Total Pending Uploads</p>
      <div class="stat-val" id="statPending" style="color:var(--cyan)">0</div>
      <div class="stat-sub">Data Delivery Delayed/Pending </div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <div class="chips-container" id="statusChipsWrap"></div>
    
    <div class="controls-wrap">
      <select class="search-input" id="teamFilter"></select>
      
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="search-input" id="searchInput" placeholder="Search member or task…" type="text">
      </div>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="state-box" id="stateBox" style="grid-column:1/-1">
      <i class="fa-solid fa-circle-notch spin"></i>
      <p>Loading team updates…</p>
      <p class="state-sub">Fetching from webhook</p>
    </div>
  </div>

</div>

<script>
/* ────────────────────────────────────────────
    DATA INTERACTION FROM WEBHOOK
──────────────────────────────────────────── */
const RAW_DATA = {{ JSON.stringify($input.all().map(i => i.json)) }};

/* ────────────────────────────────────────────
    TEAM CONFIGURATION MAP
──────────────────────────────────────────── */
const TEAM_MAP = {
  'ashiq': 'Cloud',
  'faseeha': 'Cloud',
  'arif': 'QA',
  'jeena': 'QA'
};

function getTeamName(username) {
  const cleanName = (username || '').toLowerCase().trim();
  return TEAM_MAP[cleanName] || 'E';
}

/* ────────────────────────────────────────────
    DYNAMIC AESTHETIC / PILL GENERATOR
──────────────────────────────────────────── */
function getStatusConfig(rawStatus) {
  const label = (rawStatus || 'Not Started').trim();
  const key = label.toLowerCase().replace(/[^a-z0-9]/g, '');
  const lo = label.toLowerCase();

  if (lo.includes('block')) {
    return { key, label, isBlocking: true, isEscalated: false, styles: `background:rgba(249,115,22,0.14); color:#fb923c; border:1px solid rgba(249,115,22,0.28);` };
  }
  if (lo.includes('escalat') || lo.includes('crit')) {
    return { key, label, isBlocking: false, isEscalated: true, styles: `background:rgba(239,68,68,0.14); color:#f87171; border:1px solid rgba(239,68,68,0.28);` };
  }
  if (lo.includes('work') || lo.includes('progress') || lo.includes('done') || lo.includes('complet')) {
    return { key, label, isBlocking: false, isEscalated: false, styles: `background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.25);` };
  }
  if (lo.includes('not') || lo.includes('start') || lo.includes('queue')) {
    return { key, label, isBlocking: false, isEscalated: false, styles: `background:rgba(100,116,139,0.14); color:#94a3b8; border:1px solid rgba(100,116,139,0.22);` };
  }

  let hash = 0;
  for (let i = 0; i < label.length; i++) hash = label.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return {
    key,
    label,
    isBlocking: false,
    isEscalated: false,
    styles: `background:hsla(${hue}, 45%, 50%, 0.12); color:hsl(${hue}, 70%, 72%); border:1px solid hsla(${hue}, 45%, 50%, 0.25);`
  };
}

/* ────────────────────────────────────────────
    THEME
──────────────────────────────────────────── */
let isDark = true;
const themeIcon = document.getElementById('themeIcon');
function applyTheme(dark) {
  isDark = dark;
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  themeIcon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  document.getElementById('themeToggle').style.color = dark ? '#fbbf24' : '#8b5cf6';
}
applyTheme(true);
document.getElementById('themeToggle').addEventListener('click', () => applyTheme(!isDark));

/* ────────────────────────────────────────────
    DATE PARSING
──────────────────────────────────────────── */
const urlParams = new URLSearchParams(window.location.search);
let reportDate = urlParams.get('date');
if (!reportDate) {
  const t  = new Date();
  const dd = String(t.getDate()).padStart(2,'0');
  const mm = String(t.getMonth()+1).padStart(2,'0');
  reportDate = `${dd}-${mm}-${t.getFullYear()}`;
}
function formatDate(ddmmyyyy) {
  const [dd,mm,yyyy] = ddmmyyyy.split('-');
  const d = new Date(`${yyyy}-${mm}-${dd}`);
  if (isNaN(d)) return ddmmyyyy;
  return d.toLocaleDateString('en-IN', {
    weekday:'long', day:'numeric', month:'long', year:'numeric',
    timeZone:'Asia/Kolkata'
  });
}
document.getElementById('currentDate').textContent = formatDate(reportDate);

/* ────────────────────────────────────────────
    AVATAR GENERATOR
──────────────────────────────────────────── */
const PALETTE = [
  { grad:'linear-gradient(135deg,#f59e0b,#f97316)', strip:'#f59e0b' },
  { grad:'linear-gradient(135deg,#3b82f6,#8b5cf6)', strip:'#3b82f6' },
  { grad:'linear-gradient(135deg,#06b6d4,#3b82f6)', strip:'#06b6d4' },
  { grad:'linear-gradient(135deg,#10b981,#06b6d4)', strip:'#10b981' },
  { grad:'linear-gradient(135deg,#8b5cf6,#ec4899)', strip:'#8b5cf6' }
];
function nameHash(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  return Math.abs(h) % PALETTE.length;
}
function getPalette(name) { return PALETTE[nameHash(name)] }

/* ────────────────────────────────────────────
    PARSING METHODS
──────────────────────────────────────────── */
function parseTasks(str) {
  if (!str) return [];
  return str.split('\n').map(s => s.trim()).filter(Boolean);
}

function parsePending(str) {
  if (!str) return [];
  return str.split('\n').map(line => {
    const trimmed = line.trim();
    if (!trimmed) return null;
    
    const lastDashMatch = trimmed.match(/[—–-](?=[^—–-]*$)/);
    
    if (!lastDashMatch) return { name: trimmed, status: getStatusConfig('') };
    
    const index = lastDashMatch.index;
    const name = trimmed.slice(0, index).trim();
    const status = getStatusConfig(trimmed.slice(index + 1).trim());
    
    if (!name) return null;
    return { name, status };
  }).filter(Boolean);
}

/* ────────────────────────────────────────────
    MERGE USER SUBMISSIONS
──────────────────────────────────────────── */
function mergeByUser(rows) {
  const map = new Map();

  rows.forEach(row => {
    const key = (row.user || '').toLowerCase().trim();
    if (!key) return;

    if (!map.has(key)) {
      map.set(key, {
        user:    row.user,
        date:    row.date,
        tasks:   parseTasks(row.tasks),
        pending: parsePending(row.pending),
        notes:   [(row.notes||'').trim()].filter(Boolean),
        submissionCount: 1,
      });
    } else {
      const merged = map.get(key);
      merged.submissionCount++;
      merged.date = row.date;

      const existingTaskKeys = new Set(merged.tasks.map(t => t.toLowerCase()));
      parseTasks(row.tasks).forEach(t => {
        if (!existingTaskKeys.has(t.toLowerCase())) {
          merged.tasks.push(t);
          existingTaskKeys.add(t.toLowerCase());
        }
      });

      const pendingByName = new Map(merged.pending.map(p => [p.name.toLowerCase(), p]));
      parsePending(row.pending).forEach(p => {
        pendingByName.set(p.name.toLowerCase(), p);
      });
      merged.pending = [...pendingByName.values()];

      const note = (row.notes||'').trim();
      if (note && !merged.notes.includes(note)) merged.notes.push(note);
    }
  });

  return [...map.values()].map(m => ({
    user:          m.user,
    date:          m.date,
    tasks:         m.tasks.join('\n'),
    pending:       m.pending.map(p => `${p.name} - ${p.status.label}`).join('\n'),
    notes:         m.notes.join(' · '),
    submissionCount: m.submissionCount,
  }));
}

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ────────────────────────────────────────────
    CARD COMPONENT COMPILER
──────────────────────────────────────────── */
function buildCard(row, idx) {
  const tasks   = parseTasks(row.tasks);
  const pending = parsePending(row.pending);
  const notes   = (row.notes || '').trim();
  const pal     = getPalette(row.user);
  const team    = getTeamName(row.user);

  const blockingCount  = pending.filter(p => p.status.isBlocking).length;
  const escalatedCount = pending.filter(p => p.status.isEscalated).length;

  const tasksHTML = tasks.length
    ? tasks.map(t => `<div class="task-item"><i class="fa-solid fa-circle-check"></i><span>${escHTML(t)}</span></div>`).join('')
    : `<p class="empty-inline">No tasks logged</p>`;

  const pendingHTML = pending.length
    ? pending.map(p => `
        <div class="upload-row" title="${escHTML(p.name)}">
          <i class="fa-solid fa-database" style="color:var(--cyan);font-size:11px;flex-shrink:0"></i>
          <span class="upload-name">${escHTML(p.name)}</span>
          <span class="pill" style="${p.status.styles}"><span class="pill-dot"></span>${p.status.label}</span>
        </div>`).join('')
    : `<p class="empty-inline">No uploads tracked</p>`;

  let badgesHTML = '';
  if (escalatedCount) badgesHTML += `<span class="pill" style="background:rgba(239,68,68,0.14); color:#f87171; border:1px solid rgba(239,68,68,0.28); font-size:10px"><span class="pill-dot"></span>${escalatedCount} Escalated</span>`;
  if (blockingCount)  badgesHTML += `<span class="pill" style="background:rgba(249,115,22,0.14); color:#fb923c; border:1px solid rgba(249,115,22,0.28); font-size:10px"><span class="pill-dot"></span>${blockingCount} Blocking</span>`;

  const resubBadge = (row.submissionCount > 1)
    ? `<span style="background:rgba(99,102,241,0.14);color:#a5b4fc;border:1px solid rgba(99,102,241,0.28);font-size:10px;font-weight:600;padding:2px 7px;border-radius:50px;display:inline-flex;align-items:center;gap:4px"><i class="fa-solid fa-code-merge" style="font-size:9px"></i>${row.submissionCount} submissions</span>`
    : '';

  return `
    <div class="member-card">
      <div class="card-accent" style="background:${pal.strip}"></div>
      <div class="card-body">
        <div class="member-hdr">
          <div class="member-avatar" style="background:${pal.grad}">${escHTML(row.user.charAt(0).toUpperCase())}</div>
          <div style="min-width:0">
            <div class="member-name">
              ${escHTML(row.user)}
              <span style="font-size:10px; font-weight:500; color:var(--text3); margin-left:4px; border:1px solid var(--border2); padding: 1px 5px; border-radius:4px; background:var(--bg2)">${team}</span>
            </div>
            <div class="member-date">${formatDate(row.date)}</div>
          </div>
          <div class="member-hdr-right" style="gap:5px;flex-wrap:wrap;margin-left:auto">
            ${resubBadge}
            ${badgesHTML}
          </div>
        </div>

        <div class="section">
          <div class="section-label">
            <i class="fa-solid fa-bolt" style="color:var(--accent2)"></i> Today's tasks
            <span style="margin-left:auto;background:var(--bg2);border:1px solid var(--border2);border-radius:50px;padding:1px 7px;font-size:10px;color:var(--text3)">${tasks.length}</span>
          </div>
          <div class="task-list">${tasksHTML}</div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <div class="section-label">
            <i class="fa-solid fa-cloud-arrow-up" style="color:var(--cyan)"></i> Pending uploads
            <span style="margin-left:auto;background:var(--bg2);border:1px solid var(--border2);border-radius:50px;padding:1px 7px;font-size:10px;color:var(--text3)">${pending.length}</span>
          </div>
          <div class="upload-list">${pendingHTML}</div>
        </div>

        ${notes ? `
        <div class="divider"></div>
        <div class="section">
          <div class="section-label"><i class="fa-solid fa-note-sticky" style="color:var(--purple)"></i> Notes</div>
          <div class="notes-block">${escHTML(notes)}</div>
        </div>` : ''}
      </div>
    </div>`;
}

/* ────────────────────────────────────────────
    RUNTIME DATA ENGINE & FILTERS
──────────────────────────────────────────── */
let allData      = []; 
let activeFilter = 'all';
let activeTeam   = 'all';
let searchQuery  = '';

function setupDynamicFiltersUI() {
  const statusMap = new Map();
  const teamSet = new Set();

  allData.forEach(row => {
    teamSet.add(getTeamName(row.user));
    parsePending(row.pending).forEach(p => {
      statusMap.set(p.status.key, p.status);
    });
  });

  const chipsWrap = document.getElementById('statusChipsWrap');
  let chipsHTML = `<button class="filter-chip ${activeFilter === 'all' ? 'active' : ''}" data-filter="all"><span class="filter-dot"></span> All Statuses</button>`;
  
  statusMap.forEach(status => {
    const chipStyle = status.styles.replace(/background:[^;]*;\s*/, '');
    chipsHTML += `
      <button class="filter-chip ${activeFilter === status.key ? 'active' : ''}" data-filter="${status.key}" style="${chipStyle}">
        <span class="filter-dot" style="background:currentColor"></span> ${status.label}
      </button>`;
  });
  chipsWrap.innerHTML = chipsHTML;

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      renderAll();
    });
  });

  const teamSelect = document.getElementById('teamFilter');
  let teamHTML = '<option value="all">All Teams</option>';
  [...teamSet].sort().forEach(t => {
    teamHTML += `<option value="${escHTML(t)}">${escHTML(t)}</option>`;
  });
  teamSelect.innerHTML = teamHTML;
  teamSelect.value = activeTeam;
}

function renderAll() {
  const grid = document.getElementById('cardsGrid');

  const filtered = allData.filter(row => {
    const tasks   = parseTasks(row.tasks);
    const pending = parsePending(row.pending);
    const userLo  = (row.user||'').toLowerCase();
    const searchLo = searchQuery.toLowerCase();

    if (activeTeam !== 'all' && getTeamName(row.user) !== activeTeam) return false;

    if (searchQuery) {
      const match = userLo.includes(searchLo) || 
                    tasks.some(t => t.toLowerCase().includes(searchLo)) ||
                    pending.some(p => p.name.toLowerCase().includes(searchLo));
      if (!match) return false;
    }

    if (activeFilter !== 'all') {
      return pending.some(p => p.status.key === activeFilter);
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><i class="fa-solid fa-magnifying-glass"></i>No members match the dynamic filters applied.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((row, i) => buildCard(row, i)).join('');

  const cards = grid.querySelectorAll('.member-card');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cards.forEach((el, i) => {
        el.style.transitionDelay = (0.15 + i * 0.1) + 's';
        el.classList.add('is-visible');
      });
    });
  });
}

function renderSummary(mergedRows, totalRaw) {
  let totalTasks = 0, totalPendingUploads = 0;

  mergedRows.forEach(row => {
    const tasks = parseTasks(row.tasks);
    const pending = parsePending(row.pending);
    totalTasks += tasks.length;
    totalPendingUploads += pending.length;
  });

  document.getElementById('statMembers').textContent = mergedRows.length;
  document.getElementById('statTasks').textContent   = totalTasks;
  document.getElementById('statPending').textContent = totalPendingUploads;

  document.getElementById('summaryBar').style.display = 'grid';
  document.getElementById('filterBar').style.display  = 'flex';

  // Force the browser to paint the "hidden" state at least once before
  // switching to "visible" — otherwise the two style changes can get
  // batched together and the transition never appears to run.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.stat-tile').forEach((el, i) => {
        el.style.transitionDelay = (0.15 + i * 0.18) + 's';
        el.classList.add('is-visible');
      });
    });
  });
}

/* ────────────────────────────────────────────
    INIT PROCESS
──────────────────────────────────────────── */
function loadData() {
  const grid = document.getElementById('cardsGrid');
  const rawRows = Array.isArray(RAW_DATA) && RAW_DATA.length > 0 ? RAW_DATA : [];

  if (rawRows.length === 0) {
    grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fa-solid fa-inbox"></i><p>No updates submitted today yet.</p></div>`;
    return;
  }

  allData  = mergeByUser(rawRows);
  
  setupDynamicFiltersUI();
  renderSummary(allData, rawRows.length);
  renderAll();
}

document.getElementById('teamFilter').addEventListener('change', e => {
  activeTeam = e.target.value;
  renderAll();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderAll();
});

loadData();
</script>
